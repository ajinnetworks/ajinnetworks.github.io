---
layout: default
---
<div class="category-page">
  <h2>{{ page.title }}</h2>
  <ul>
    {% for post in site.posts %}
      {% if post.categories contains page.category %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <span>{{ post.date | date: "%Y년 %m월 %d일" }}</span>
      </li>
      {% endif %}
    {% endfor %}
  </ul>
</div>
