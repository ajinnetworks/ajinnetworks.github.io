<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ajin Music">
<title>Ajin Soft Rock Ballad Player</title>
<link rel="manifest" href="manifest.json">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#0a0a0c;display:flex;justify-content:center;align-items:flex-start;font-family:'Space Mono',monospace;overflow-x:hidden}
.phone{width:100%;max-width:400px;min-height:100vh;background:#0a0a0c;display:flex;flex-direction:column}

.cov{position:relative;width:100%;height:220px;background:#111115;overflow:hidden;flex-shrink:0}
.cov-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;display:none}
.cov-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.vinyl{width:90px;height:90px;border-radius:50%;background:repeating-conic-gradient(#1a1a1e 0deg 10deg,#222228 10deg 20deg);display:flex;align-items:center;justify-content:center}
.vinyl.sp{animation:vs 2.5s linear infinite}
@keyframes vs{to{transform:rotate(360deg)}}
.vc{width:26px;height:26px;border-radius:50%;background:#e8a030;display:flex;align-items:center;justify-content:center}
.vd{width:7px;height:7px;border-radius:50%;background:#0a0a0c}
.cov-ov{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 45%,#0a0a0c 100%)}
.cbadge{position:absolute;top:12px;left:14px;font-size:8px;color:#e8a030;border:1px solid #e8a030;border-radius:3px;padding:2px 7px;letter-spacing:2px;background:rgba(10,10,12,0.8)}
.cnum{position:absolute;top:12px;right:14px;font-size:9px;color:#555;letter-spacing:1px}
.drop-hint{font-size:8px;color:#252528;letter-spacing:1px}

.inf{padding:14px 20px 6px}
.tt{font-family:'Bebas Neue',sans-serif;font-size:26px;color:#f0ece0;letter-spacing:1px;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ta{font-size:9px;color:#e8a030;letter-spacing:3px;margin-top:3px}
.ty{font-size:8px;color:#444;letter-spacing:1px;margin-top:2px}

.vu-row{display:flex;gap:3px;padding:10px 20px 6px;align-items:flex-end;height:40px;flex-shrink:0}
.vb{flex:1;border-radius:2px;background:#1a1a1e;min-height:3px;transition:height 0.08s,background 0.08s}

.ps{padding:0 20px 10px}
.pt{display:flex;justify-content:space-between;font-size:9px;color:#444;margin-bottom:6px;letter-spacing:1px}
.pb{width:100%;height:4px;background:#222228;border-radius:2px;cursor:pointer;position:relative}
.pf{height:100%;background:#e8a030;border-radius:2px;width:0%;transition:width 0.3s linear}
.pth{position:absolute;width:14px;height:14px;border-radius:50%;background:#f0ece0;top:50%;transform:translate(-50%,-50%);left:0%;pointer-events:none}

.ctrl{display:flex;align-items:center;justify-content:center;gap:18px;padding:6px 20px 10px}
.xb{background:none;border:none;cursor:pointer;color:#555;padding:8px;display:flex;align-items:center;transition:color 0.15s}
.xb:active{color:#e8a030}
.pb2{width:60px;height:60px;border-radius:50%;background:#e8a030;color:#0a0a0c;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pb2:active{transform:scale(0.92)}

.vr{display:flex;align-items:center;gap:10px;padding:0 20px 10px}
.vl{font-size:9px;color:#444;letter-spacing:2px;min-width:24px}
.vt{flex:1;height:4px;background:#222228;border-radius:2px;cursor:pointer;position:relative}
.vfi{height:100%;background:#555;border-radius:2px;width:80%}
.vth{position:absolute;width:14px;height:14px;border-radius:50%;background:#f0ece0;top:50%;transform:translate(-50%,-50%);left:80%}
.vv{font-size:9px;color:#444;min-width:24px;text-align:right}

.st{font-size:8px;padding:0 20px 6px;letter-spacing:1px;min-height:14px}
.st.ok{color:#2ecc71}.st.er{color:#e74c3c}.st.ld{color:#e8a030}.st.df{color:#444}
.live-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#e8a030;margin-right:4px;animation:pu 1s ease-in-out infinite alternate}
@keyframes pu{from{opacity:0.3}to{opacity:1}}

.tabs{display:flex;border-top:1px solid #1a1a1e;border-bottom:1px solid #1a1a1e;flex-shrink:0}
.tab{flex:1;padding:10px 0;font-size:9px;color:#444;letter-spacing:2px;text-align:center;cursor:pointer;border:none;background:none}
.tab.ac{color:#e8a030;background:#0f0f12;border-bottom:2px solid #e8a030}

.panel{flex:1;overflow-y:auto}
.pi{display:flex;align-items:center;gap:10px;padding:12px 20px;cursor:pointer;border-bottom:1px solid #0f0f12}
.pi:active{background:#131318}.pi.ac{background:#131318}
.pn{font-size:9px;color:#2a2a2e;min-width:16px}
.pb3{flex:1;overflow:hidden}
.pt2{font-size:12px;color:#666;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pa2{font-size:9px;color:#2a2a2e;margin-top:2px;letter-spacing:1px}
.pd{font-size:9px;color:#2a2a2e}
.pi.ac .pn{color:#e8a030}.pi.ac .pt2{color:#f0ece0}
.pi.live .pd{color:#2ecc71}.pi.pending .pd{color:#555}

.upanel{padding:16px 20px;display:flex;flex-direction:column;gap:10px}
.urow{display:flex;flex-direction:column;gap:5px}
.ulbl{font-size:8px;color:#555;letter-spacing:2px}
.uinp-row{display:flex;gap:6px}
.inp{flex:1;background:#141416;border:1px solid #2a2a2e;border-radius:8px;color:#888;font-family:'Space Mono',monospace;font-size:10px;padding:10px 12px;outline:none;min-width:0}
.inp:focus{border-color:#e8a030;color:#f0ece0}
.inp::placeholder{color:#252528}
.lbtn{background:#1e1e22;border:none;border-radius:8px;color:#888;font-family:'Space Mono',monospace;font-size:9px;padding:10px 12px;cursor:pointer;font-weight:700;white-space:nowrap}
.lbtn:active{background:#e8a030;color:#0a0a0c}

.eq{display:inline-flex;gap:1px;align-items:flex-end;height:10px}
.eq span{width:2px;background:#e8a030;border-radius:1px;animation:eq 0.5s ease-in-out infinite alternate}
.eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}
@keyframes eq{from{height:2px}to{height:10px}}
</style>
</head>
<body>
<div class="phone">
  <div class="cov" id="covSec">
    <div class="cov-ph" id="covPh">
      <div class="vinyl" id="vinyl"><div class="vc"><div class="vd"></div></div></div>
      <span class="drop-hint">AJIN SOFT ROCK BALLAD</span>
    </div>
    <img class="cov-img" id="covImg" alt="cover">
    <div class="cov-ov"></div>
    <span class="cbadge">STEREO</span>
    <span class="cnum" id="covNum">01 / 05</span>
  </div>

  <div class="inf">
    <div class="tt" id="tTitle">Yesterday Once More</div>
    <div class="ta" id="tArtist">THE CARPENTERS</div>
    <div class="ty" id="tYear">1973 · Soft Rock</div>
  </div>

  <div class="vu-row" id="vuRow"></div>

  <div class="ps">
    <div class="pt"><span id="curT">0:00</span><span id="totT">--:--</span></div>
    <div class="pb" id="pBar"><div class="pf" id="pFill"></div><div class="pth" id="pThumb"></div></div>
  </div>

  <div class="ctrl">
    <button class="xb" onclick="prevT()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
    <button class="xb" onclick="seek(-10)"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6 8.5 6V6l-8.5 6z"/></svg></button>
    <button class="pb2" id="pBtn" onclick="togglePlay()"><svg id="pIcon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="xb" onclick="seek(10)"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></button>
    <button class="xb" onclick="nextT()"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></button>
  </div>

  <div class="vr">
    <span class="vl">VOL</span>
    <div class="vt" id="vTrack" onclick="setVol(event)"><div class="vfi" id="vFill"></div><div class="vth" id="vThumb"></div></div>
    <span class="vv" id="vVal">80</span>
  </div>

  <div class="st df" id="status"><span class="live-dot"></span>Ajin Soft Rock Ballad Player</div>

  <div class="tabs">
    <button class="tab ac" onclick="showTab('pl',this)">PLAYLIST</button>
    <button class="tab" onclick="showTab('up',this)">ADD TRACK</button>
  </div>

  <div class="panel" id="panelPl"><div id="playlist"></div></div>

  <div class="panel" id="panelUp" style="display:none">
    <div class="upanel">
      <div class="urow">
        <span class="ulbl">트랙 선택</span>
        <select class="inp" id="trackSel">
          <option value="2">03 — 그대 없는 밤</option>
          <option value="3">04 — 빗속의 기억</option>
          <option value="4">05 — 새벽 두 시</option>
        </select>
      </div>
      <div class="urow">
        <span class="ulbl">GitHub Raw MP3 URL</span>
        <div class="uinp-row">
          <input class="inp" id="audioUrl" placeholder="https://raw.githubusercontent.com/...mp3">
          <button class="lbtn" onclick="addAudio()">SET</button>
        </div>
      </div>
      <div class="urow">
        <span class="ulbl">앨범 커버 URL</span>
        <div class="uinp-row">
          <input class="inp" id="coverUrl" placeholder="https://...jpg">
          <button class="lbtn" onclick="addCover()">SET</button>
        </div>
      </div>
    </div>
  </div>

  <audio id="aud" preload="none" crossorigin="anonymous"></audio>
</div>

<script>
const RAW='https://raw.githubusercontent.com/ajinnetworks/Ajin-Soft-Rock-Ballad/main/';
const tracks=[
  {title:'Yesterday Once More',artist:'The Carpenters',year:'1973 · Soft Rock',dur:'--:--',secs:0,url:RAW+'Carpenters%20_Yesterday%20Once%20More.mp3',cover:''},
  {title:'Time in a Bottle',artist:'Jim Croce',year:'1973 · Folk Rock',dur:'--:--',secs:0,url:RAW+"Jim%20Croce%27s%20-Time%20in-%20a%20-Bottle.mp3",cover:''},
  {title:'그대 없는 밤',artist:'Ajin Soft Rock Ballad',year:'2025 · Korean Ballad',dur:'4:02',secs:242,url:'',cover:''},
  {title:'빗속의 기억',artist:'Ajin Soft Rock Ballad',year:'2025 · Korean Ballad',dur:'3:48',secs:228,url:'',cover:''},
  {title:'새벽 두 시',artist:'Ajin Soft Rock Ballad',year:'2025 · Korean Ballad',dur:'4:30',secs:270,url:'',cover:''},
];
let ci=0,playing=false,curSec=0,vuInt=null;
const aud=document.getElementById('aud');
const vuR=document.getElementById('vuRow');
for(let i=0;i<28;i++){const d=document.createElement('div');d.className='vb';d.style.height='3px';vuR.appendChild(d);}
const vbs=[...vuR.children];
function vuC(p){return p<0.55?'#2ecc71':p<0.8?'#e8a030':'#e74c3c';}
function animVU(){if(!playing){vbs.forEach(b=>{b.style.height='3px';b.style.background='#1a1a1e';});return;}const base=Math.random()*0.5+0.35;vbs.forEach((b,i)=>{const w=Math.sin(i/28*Math.PI)*0.6+0.4;const h=Math.max(3,Math.round((base*w+Math.random()*0.2)*30));b.style.height=h+'px';b.style.background=vuC(h/30);});}
function fmt(s){if(!s||s<=0)return '--:--';return Math.floor(s/60)+':'+String(Math.floor(s%60)).padStart(2,'0');}
function setStatus(msg,type='df'){const el=document.getElementById('status');el.innerHTML=type==='df'?'<span class="live-dot"></span>'+msg:'· '+msg;el.className='st '+type;}
function showTab(name,btn){document.getElementById('panelPl').style.display=name==='pl'?'block':'none';document.getElementById('panelUp').style.display=name==='up'?'block':'none';document.querySelectorAll('.tab').forEach(t=>t.classList.remove('ac'));btn.classList.add('ac');}
function updateUI(){const t=tracks[ci];document.getElementById('tTitle').textContent=t.title;document.getElementById('tArtist').textContent=t.artist;document.getElementById('tYear').textContent=t.year;document.getElementById('covNum').textContent=String(ci+1).padStart(2,'0')+' / '+String(tracks.length).padStart(2,'0');document.getElementById('vinyl').className='vinyl'+(playing?' sp':'');if(t.cover){document.getElementById('covImg').src=t.cover;document.getElementById('covImg').style.display='block';document.getElementById('covPh').style.display='none';}else{document.getElementById('covImg').style.display='none';document.getElementById('covPh').style.display='flex';}renderPL();}
function renderPL(){document.getElementById('playlist').innerHTML=tracks.map((t,i)=>`<div class="pi${i===ci?' ac':''}${t.url?' live':' pending'}" onclick="selT(${i})"><span class="pn">${i===ci&&playing?'<span class="eq"><span></span><span></span><span></span></span>':String(i+1).padStart(2,'0')}</span><div class="pb3"><div class="pt2">${t.title}</div><div class="pa2">${t.artist}</div></div><span class="pd">${t.url?'▶':'ADD'}</span></div>`).join('');}
function updateProg(){const t=tracks[ci];const pct=t.secs>0?Math.min(100,curSec/t.secs*100):0;const p=pct.toFixed(1)+'%';document.getElementById('pFill').style.width=p;document.getElementById('pThumb').style.left=p;document.getElementById('curT').textContent=fmt(curSec);}
aud.addEventListener('timeupdate',()=>{if(!aud.paused){curSec=aud.currentTime;updateProg();}});
aud.addEventListener('loadedmetadata',()=>{const d=Math.floor(aud.duration);tracks[ci].secs=d;tracks[ci].dur=fmt(d);document.getElementById('totT').textContent=fmt(d);setStatus('재생 준비 완료 — '+tracks[ci].title,'ok');renderPL();});
aud.addEventListener('ended',()=>nextT());
aud.addEventListener('error',()=>setStatus('로드 실패','er'));
aud.addEventListener('waiting',()=>setStatus('버퍼링 중...','ld'));
aud.addEventListener('playing',()=>setStatus('재생 중 — Ajin Music Player','df'));
function startVU(){clearInterval(vuInt);vuInt=setInterval(animVU,85);}
function stopVU(){clearInterval(vuInt);animVU();}
function loadTrack(idx,autoplay){ci=idx;curSec=0;aud.pause();aud.src='';const t=tracks[idx];document.getElementById('totT').textContent=t.dur;updateProg();if(t.url){aud.src=t.url;aud.volume=parseInt(document.getElementById('vVal').textContent)/100;aud.load();if(autoplay)aud.play().catch(()=>{});setStatus('로딩 중 — '+t.title,'ld');}else{setStatus('ADD TRACK 탭에서 URL을 추가해 주세요','er');}updateUI();}
function togglePlay(){if(!tracks[ci].url){setStatus('URL 없음','er');return;}playing=!playing;if(playing){if(!aud.src){aud.src=tracks[ci].url;aud.load();}aud.play().catch(()=>{});startVU();}else{aud.pause();stopVU();}document.getElementById('pIcon').innerHTML=playing?'<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>':'<path d="M8 5v14l11-7z"/>';updateUI();}
function selT(i){playing=true;document.getElementById('pIcon').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';startVU();loadTrack(i,true);}
function prevT(){selT((ci-1+tracks.length)%tracks.length);}
function nextT(){selT((ci+1)%tracks.length);}
function seek(s){const n=Math.max(0,aud.currentTime+s);aud.currentTime=n;curSec=n;updateProg();}
document.getElementById('pBar').addEventListener('click',function(e){if(!tracks[ci].secs)return;const r=this.getBoundingClientRect();const t=Math.round((e.clientX-r.left)/r.width*tracks[ci].secs);aud.currentTime=t;curSec=t;updateProg();});
function setVol(e){const r=document.getElementById('vTrack').getBoundingClientRect();const v=Math.min(100,Math.max(0,Math.round((e.clientX-r.left)/r.width*100)));document.getElementById('vFill').style.width=v+'%';document.getElementById('vThumb').style.left=v+'%';document.getElementById('vVal').textContent=v;aud.volume=v/100;}
function addAudio(){const idx=parseInt(document.getElementById('trackSel').value);const url=document.getElementById('audioUrl').value.trim();if(!url){setStatus('URL을 입력해 주세요','er');return;}tracks[idx].url=url;setStatus(tracks[idx].title+' 등록 완료','ok');renderPL();document.getElementById('audioUrl').value='';}
function addCover(){const idx=parseInt(document.getElementById('trackSel').value);const url=document.getElementById('coverUrl').value.trim();if(!url){setStatus('이미지 URL을 입력해 주세요','er');return;}tracks[idx].cover=url;if(ci===idx){const img=document.getElementById('covImg');img.src=url;img.style.display='block';document.getElementById('covPh').style.display='none';}setStatus(tracks[idx].title+' 커버 등록 완료','ok');document.getElementById('coverUrl').value='';}
aud.volume=0.8;loadTrack(0,false);
</script>
</body>
</html>
